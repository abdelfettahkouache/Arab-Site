<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}


body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(-45deg,#001510,#003d2d,#001b14,#000);

    background-size:400% 400%;
    animation:bg 8s infinite;

    color:white;

}



@keyframes bg{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}



.container{

width:90%;
max-width:1000px;

display:flex;
justify-content:space-between;
align-items:center;

padding:50px;

background:rgba(0,255,150,.08);

border:2px solid #00ff99;

border-radius:30px;

box-shadow:0 0 40px #00ff99;

}



.side{

width:240px;

padding:30px;

text-align:center;

border:2px solid #00ff99;

border-radius:20px;

box-shadow:0 0 20px #00ff99;

}



.side h2{

color:#00ff99;

margin:10px;

}



.center{

text-align:center;

}



.logo{

width:140px;
height:140px;

margin:auto;

border-radius:50%;

border:4px solid #00ff99;

box-shadow:0 0 30px #00ff99;

}



h1{

color:#00ff99;

font-size:45px;

margin:20px;

}



p{

font-size:20px;

}



.btn{

display:inline-block;

margin:20px 10px;

padding:12px 30px;

background:#00a86b;

color:white;

text-decoration:none;

border-radius:30px;

transition:.3s;

}



.btn:hover{

transform:scale(1.1);

box-shadow:0 0 20px #00ff99;

}



</style>

</head>



<body>
